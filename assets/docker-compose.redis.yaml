# Redis service for prod-parity local caching (bundled by augustash/ddev-drupal,
# modeled on the official ddev/ddev-redis add-on). Committed like the Solr and
# Selenium services; enabled via the "Do you need Redis support?" setup prompt.
# Pin the image here — this is the version we control.
services:
  redis:
    container_name: ddev-${DDEV_SITENAME}-redis
    image: redis:7
    hostname: redis
    # These labels ensure this service is discoverable by ddev.
    labels:
      com.ddev.site-name: ${DDEV_SITENAME}
      com.ddev.approot: ${DDEV_APPROOT}
    restart: "no"
    expose:
      - 6379
    volumes:
      - ".:/mnt/ddev_config"
      - "ddev-global-cache:/mnt/ddev-global-cache"
      - "./redis:/etc/redis/conf"
      - "redis:/data"
    command: /etc/redis/conf/redis.conf
    x-ddev:
      describe-url-port: |
        Backend: redis:7
      describe-info: |
        Pass: <none>

volumes:
  redis:
