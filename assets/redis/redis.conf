# Redis configuration for the bundled ddev-drupal Redis service.
# Reference: http://download.redis.io/redis-stable/redis.conf

# Cap memory and evict least-frequently-used keys under pressure — mirrors a
# bounded production cache so local behavior (and load-test results) are
# representative rather than relying on unbounded local RAM.
maxmemory 2048mb
maxmemory-policy allkeys-lfu

# Persistence is off for a local cache (it's disposable; drush cr or a restart
# rebuilds it). Leaving default RDB save rules on lets the cache grow a multi-GB
# dump that reloads on start and, worse, forks to BGSAVE — the copy-on-write
# spike gets the container OOM-killed (exit 137). Keep both disabled.
appendonly no
save ""
